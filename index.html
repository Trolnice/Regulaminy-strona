<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Fiszki Aniulka</title>
<style>
  :root{
    --bg:#0a1008;
    --card:#0b1b0b;
    --accent:#a5c17b;
    --muted:#cccba5;
    --glass: rgba(255,255,255,0.03);
  }
  *{box-sizing:border-box}
  body{
    margin:0;
    font-family:Inter,system-ui,Segoe UI,Roboto,"Helvetica Neue",Arial;
    background: linear-gradient(180deg,#0a1008 0%, #1b2a14 100%);
    color:#f4f5e7;
    padding:20px;
  }
  header{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    align-items:center;
    justify-content:space-between;
    margin-bottom:16px;
  }
  h1{margin:0;font-size:20px}
  .sub{color:var(--muted);font-size:13px}
  .layout{
    display:grid;
    grid-template-columns: 1fr;
    gap:16px;
  }

  @media(min-width:900px){
    .layout{
      grid-template-columns: 320px 1fr;
    }
  }

  .panel{
    background:var(--glass);
    border-radius:12px;
    padding:12px;
  }
  .deck-list{display:flex;flex-direction:column;gap:8px;margin-top:12px}
  .deck{
    display:flex;flex-direction:column;
    padding:8px;border-radius:10px;cursor:pointer;
    background:var(--glass);border:1px solid rgba(255,255,255,0.05);
  }
  .deck.active{outline:2px solid rgba(165,193,123,0.3);}
  .small{font-size:13px;color:var(--muted)}

  .main{display:flex;flex-direction:column;gap:16px;perspective: 1000px;}
  .flashcard{
    width:100%;min-height:220px;
    background:transparent;
    border:none;
    cursor:pointer;
  }
  .flashcard-inner {
    position: relative;
    width: 100%;
    height: 100%;
    min-height: 220px;
    text-align: center;
    transition: transform 0.6s;
    transform-style: preserve-3d;
  }
  .flashcard.flipped .flashcard-inner {
    transform: rotateY(180deg);
  }
  .flashcard-front, .flashcard-back {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    -webkit-backface-visibility: hidden;
    backface-visibility: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 16px;
    border-radius: 12px;
    border: 1px solid rgba(255,255,255,0.05);
  }
  .flashcard-front {
    background: linear-gradient(180deg, #14240f, #1c3114);
  }
  .flashcard-back {
    background: linear-gradient(180deg, #1c3114, #14240f);
    transform: rotateY(180deg);
  }
  .flashcard h2{margin-top:0;font-size:18px}
  .flashcard .answer{margin-top:8px;font-size:16px}
  .flashcard .quote{margin-top:12px;font-size:12px;color:var(--muted)}
  .card-counter-on-card {
    position: absolute;
    top: 10px;
    right: 15px;
    font-size: 12px;
    color: var(--muted);
  }
  .controls{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
  button.btn{
    background:transparent;border:1px solid rgba(255,255,255,0.2);
    padding:6px 10px;border-radius:8px;color:var(--accent);
    cursor:pointer;font-weight:600;font-size:14px;
  }
  .quiz{
    background:var(--glass);
    padding:12px;border-radius:12px;
  }
  .q-title{font-weight:700;margin-bottom:8px}
  .options{display:flex;flex-direction:column;gap:6px}
  .opt{padding:8px;border-radius:8px;border:1px solid rgba(255,255,255,0.1);cursor:pointer}
  .opt.correct{background:#204820;color:#d8f5c5}
  .opt.incorrect{background:#482020;color:#f5c5c5}
  .instruction-text{text-align:center;color:var(--muted);font-size:13px;margin-top:8px;}
</style>
</head>
<body>
<header>
  <div>
    <h1>Dasz radę skarbie!❤️</h1>
  </div>
</header>

<div class="layout">
  <aside class="panel">
    <div style="font-weight:700">Talie</div>
    <div id="deckList" class="deck-list"></div>
    <hr style="margin:10px 0;border:0;border-top:1px solid rgba(255,255,255,0.1)">
    <button class="btn" id="modeFlash">Fiszki</button>
    <button class="btn" id="modeQuizDy">Quiz Dyżurny</button>
    <button class="btn" id="modeQuizBr">Quiz Broń</button>
  </aside>

  <main class="main">
    <div id="flashcard-container" style="display: block;">
      <div class="flashcard" id="flashcard">
        <div class="flashcard-inner">
          <div class="flashcard-front">
            <div class="card-counter-on-card"></div>
            <h2 id="cardQ">Pytanie</h2>
          </div>
          <div class="flashcard-back">
            <div class="card-counter-on-card"></div>
            <h2 id="cardA" class="answer"></h2>
            <div id="cardQuote" class="quote"></div>
          </div>
        </div>
      </div>
      <div class="controls" style="align-items:center;">
        <button class="btn" id="prevCard">← Poprzednia</button>
        <button class="btn" id="flipCard">Obróć</button>
        <button class="btn" id="nextCard">Następna →</button>
      </div>
      <div class="instruction-text">aby odwrócić fiszkę kliknij na nią</div>
    </div>
    <section class="quiz" id="quiz-container" style="display: none;">
      <div class="q-title" id="quizTitle">Quiz</div>
      <div id="quizQuestion"></div>
      <div class="options" id="quizOptions"></div>
      <button class="btn" id="nextQuiz" style="margin-top:8px;display:none">Następne ▶</button>
    </section>
  </main>
</div>

<script src="data.js"></script>
<script>
// === LOGIKA ===
const flashcardContainer = document.getElementById('flashcard-container');
const quizContainer = document.getElementById('quiz-container');
const flashcard = document.getElementById('flashcard');

let activeDeck = deckDuty;
let cardIndex=0;

// Cache DOM elements for performance
const cardQ = document.getElementById('cardQ');
const cardA = document.getElementById('cardA');
const cardQuote = document.getElementById('cardQuote');

function renderDecks(){
  const dl=document.getElementById('deckList');
  dl.innerHTML='';
  [deckDuty,deckFirearm].forEach(d=>{
    const div=document.createElement('div');
    div.className='deck'+(activeDeck.id===d.id?' active':'');
    div.innerHTML=`<div>${d.title}</div><div class="small">${d.cards.length} kart</div>`;
    div.onclick=()=>{activeDeck=d;cardIndex=0;renderCard();renderDecks();}
    dl.appendChild(div);
  });
}

function renderCard(){
  // Always show the front of the card when rendering a new one
  flashcard.classList.remove('flipped');

  // A short delay to allow the card to flip back before changing content
  setTimeout(() => {
    const c = activeDeck.cards[cardIndex % activeDeck.cards.length];
    if(!c){
      cardQ.textContent='Brak kart';
      cardA.textContent='';
      cardQuote.textContent='';
      return;
    }

    cardQ.textContent = c.question;
    cardA.textContent = c.answer;
    cardQuote.textContent = `Cytat: ${c.quote}`;
    const counterText = `${(cardIndex % activeDeck.cards.length) + 1} / ${activeDeck.cards.length}`;
    document.querySelectorAll('.card-counter-on-card').forEach(c => c.textContent = counterText);
  }, 150); // Delay should be less than half of the transition time
}
document.getElementById('prevCard').onclick=()=>{cardIndex=(cardIndex-1+activeDeck.cards.length)%activeDeck.cards.length;renderCard();}
document.getElementById('nextCard').onclick=()=>{cardIndex=(cardIndex+1)%activeDeck.cards.length;renderCard();}
const flipAction = ()=>{
  flashcard.classList.toggle('flipped');
};
document.getElementById('flipCard').onclick = flipAction;
flashcard.onclick = flipAction;
renderDecks();
renderCard(); // Initial render

// Quiz
let quizIndex=0,quizScore=0,quizArr=[];
function startQuiz(arr){
  quizArr=arr;quizIndex=0;quizScore=0;
  renderQuiz();
}
function renderQuiz(){
  document.getElementById('quizOptions').innerHTML='';
  if(quizIndex>=quizArr.length){
    document.getElementById('quizTitle').textContent=`Koniec quizu! Wynik ${quizScore}/${quizArr.length}`;
    document.getElementById('quizQuestion').textContent = '';
    document.getElementById('nextQuiz').style.display='none';
    return;
  }
  const q=quizArr[quizIndex];
  document.getElementById('quizTitle').textContent=`Pytanie ${quizIndex+1}/${quizArr.length}`;
  document.getElementById('quizQuestion').textContent=q.q;
  const optionsContainer = document.getElementById('quizOptions');
  q.options.forEach((opt,i)=>{
    const b=document.createElement('div');b.className='opt';b.textContent=opt;
    b.onclick=()=>{
      // Blokada wszystkich przycisków po udzieleniu odpowiedzi
      const allOptions = optionsContainer.children;
      for(let opt of allOptions){
        opt.onclick = null;
      }

      if(i===q.correct){
        b.classList.add('correct');
        quizScore++;
      }else{
        b.classList.add('incorrect');
        // Podświetlenie poprawnej odpowiedzi
        allOptions[q.correct].classList.add('correct');
      }
      document.getElementById('nextQuiz').style.display='inline-block';
    };
    optionsContainer.appendChild(b);
  });
}
document.getElementById('nextQuiz').onclick=()=>{quizIndex++;document.getElementById('nextQuiz').style.display='none';renderQuiz();}

// Mode switching
document.getElementById('modeFlash').onclick=()=>{
  quizContainer.style.display = 'none';
  flashcardContainer.style.display = 'block';
  renderCard();
}
document.getElementById('modeQuizDy').onclick=()=>{
  flashcardContainer.style.display = 'none';
  quizContainer.style.display = 'block';
  startQuiz(quizDy);
}
document.getElementById('modeQuizBr').onclick=()=>{
  flashcardContainer.style.display = 'none';
  quizContainer.style.display = 'block';
  startQuiz(quizBr);
}
</script>
</body>
</html>
